<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet</title>
  <meta name="description" content="A modern social network" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css" />

  <script>
  (function() {
    const t = localStorage.getItem('sn_theme') || 'dark';
    if (t === 'light') document.documentElement.classList.add('light-preload');
  })();
</script>
</head>
<body>

<!-- ── Global Loader ───────────────────────────── -->
<div id="global-loader">
  <div class="loader-ring"></div>
</div>

<!-- ── Toast Container ────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Auth View (login / register) ───────────── -->
<div id="auth-view" class="hidden">
  <div id="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">SocialNet</div>

      <!-- Login Form -->
      <div id="login-form">
        <p class="auth-subtitle">Welcome back 👋</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="login-email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="login-password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button id="login-btn" class="btn btn-primary w-full">Sign In</button>
        <p class="auth-switch">
          New here? <a href="#" id="go-register">Create an account</a>
        </p>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="hidden">
        <p class="auth-subtitle">Join the conversation</p>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="reg-name" type="text" class="form-input" placeholder="Jane Doe" />
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="reg-username" type="text" class="form-input" placeholder="janedoe" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="reg-email" type="email" class="form-input" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="reg-password" type="password" class="form-input" placeholder="Min 6 characters" />
        </div>
        <button id="register-btn" class="btn btn-primary w-full">Create Account</button>
        <p class="auth-switch">
          Already have an account? <a href="#" id="go-login">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- ── Main App View ────────────────────────────── -->
<div id="main-view" class="hidden">

  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-logo">SN</div>

    <div class="nav-search-wrap">
      <i class="fas fa-search nav-search-icon"></i>
      <input id="nav-search" class="nav-search" type="text" placeholder="Search people or posts…" autocomplete="off" />
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <div class="nav-actions">
      <!-- Dark mode toggle -->
      <button class="nav-btn" id="theme-toggle" title="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>

      <!-- Notifications -->
      <div style="position:relative;">
        <button class="nav-btn" id="notif-btn" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="badge hidden" id="notif-badge">0</span>
        </button>
        <div id="notif-dropdown" class="notif-dropdown hidden"></div>
      </div>

      <!-- Profile avatar -->
      <img id="nav-avatar" class="nav-avatar" src="/assets/uploads/default-avatar.png" alt="Me"
           onclick="navigate('profile-me')" />
    </div>
  </nav>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <a href="#" class="sidebar-link active" data-page="feed">
        <i class="fas fa-house"></i> Home
      </a>
      <a href="#" class="sidebar-link" data-page="explore">
        <i class="fas fa-compass"></i> Explore
      </a>
      <a href="#" class="sidebar-link" data-page="notifications">
        <i class="fas fa-bell"></i> Notifications
      </a>
      <a href="#" class="sidebar-link" data-page="dashboard">
        <i class="fas fa-chart-bar"></i> Dashboard
      </a>
      <hr class="sidebar-divider" />
      <a href="#" class="sidebar-link" data-page="profile-me">
        <i class="fas fa-user"></i> Profile
      </a>
      <a href="#" class="sidebar-link" id="logout-link">
        <i class="fas fa-right-from-bracket"></i> Logout
      </a>
    </aside>

    <!-- Dynamic content -->
    <main id="main-content">
      <div id="page-feed"></div>
      <div id="page-explore"       class="hidden"></div>
      <div id="page-notifications" class="hidden"></div>
      <div id="page-dashboard"     class="hidden"></div>
      <div id="page-profile"       class="hidden"></div>
    </main>

    <!-- Right panel -->
    <aside id="right-panel">
      <div id="trending-box" class="suggest-card">
        <p class="suggest-title"><i class="fas fa-fire" style="color:var(--warning)"></i> Trending</p>
        <div id="trending-list"><div class="spinner"></div></div>
      </div>
      <div id="suggestions-box" class="suggest-card mt-3">
        <p class="suggest-title">Who to follow</p>
        <div id="suggestions-list"><div class="spinner"></div></div>
      </div>
    </aside>
  </div>
</div>

<!-- ── Socket.io ─────────────────────────────────── -->
<script src="/socket.io/socket.io.js"></script>

<!-- ── App modules ───────────────────────────────── -->
<script src="/js/modules/api.js"></script>
<script src="/js/modules/auth.js"></script>
<script src="/js/modules/utils.js"></script>
<script src="/js/modules/posts.js"></script>
<script src="/js/modules/comments.js"></script>
<script src="/js/modules/profile.js"></script>
<script src="/js/modules/search.js"></script>
<script src="/js/modules/notifications.js"></script>
<script src="/js/modules/socket.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
